<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; img-src https: data:; connect-src 'none'; script-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'"
    />
    <title>Markdown Review — Inline Comments for Agents</title>
    <!-- FOUC 防止のため stylesheet より前で paint 直前に .dark を付ける。
         優先順位 P1: localStorage > <html data-theme> > prefers-color-scheme
         (DESIGN.md §7c / §12 §1 Theming 行)。
         壊れた値 (旧バージョン / 他アプリの混入 / 手動編集) で初期描画と後続ランタイムが
         ズレないよう、'system' | 'light' | 'dark' のホワイトリストで検証する
         (theme.ts の isStoredTheme と同じ判定)。 -->
    <script>
      try {
        var stored = localStorage.getItem('mdxg-redline.theme')
        var hint = document.documentElement.getAttribute('data-theme')
        var s = stored === 'system' || stored === 'light' || stored === 'dark' ? stored : null
        var h = hint === 'system' || hint === 'light' || hint === 'dark' ? hint : null
        var effective = s || h || 'system'
        var dark =
          effective === 'dark' ||
          (effective === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
        if (document.querySelector('meta[name="mdxg-redline:embedded-md"]')) {
          document.documentElement.classList.add('has-embedded-md')
        }
      } catch (e) {}
      // --- Sidebar width / open state (FOUC 防止のため stylesheet より前で確定する) ---
      // 優先順位 P1: localStorage > <html data-sidebar-width> > default 360 (open)。
      // theme と同じく、壊れた値 (旧バージョン / 他アプリの混入 / 手動編集) で初期描画と
      // 後続ランタイムがズレないよう、240–640 の数値・open/closed ホワイトリストで検証する
      // (sidebar-width.ts の isValidStoredWidth / isSidebarOpenState と同じ判定)。
      try {
        var sbWidthRaw = localStorage.getItem('mdxg-redline.sidebar-width')
        var sbOpenRaw = localStorage.getItem('mdxg-redline.sidebar-open')
        var sbHintRaw = document.documentElement.getAttribute('data-sidebar-width')
        var sbWidthNum = sbWidthRaw === null ? NaN : Number(sbWidthRaw)
        var sbWidth =
          isFinite(sbWidthNum) && sbWidthNum >= 240 && sbWidthNum <= 640 ? sbWidthNum : null
        var sbOpen = sbOpenRaw === 'open' || sbOpenRaw === 'closed' ? sbOpenRaw : null
        var sbHintNum = sbHintRaw === null || sbHintRaw === '' ? NaN : Number(sbHintRaw)
        var sbHintWidth = null
        var sbHintOpen = null
        if (sbHintNum === 0) {
          sbHintOpen = 'closed'
        } else if (isFinite(sbHintNum) && sbHintNum >= 240 && sbHintNum <= 640) {
          sbHintWidth = sbHintNum
          sbHintOpen = 'open'
        }
        var effWidth = sbWidth !== null ? sbWidth : sbHintWidth !== null ? sbHintWidth : 360
        var effOpen = sbOpen !== null ? sbOpen : sbHintOpen !== null ? sbHintOpen : 'open'
        document.documentElement.style.setProperty(
          '--sidebar-width',
          effOpen === 'open' ? effWidth + 'px' : '0px'
        )
        if (effOpen === 'closed') document.documentElement.classList.add('sidebar-closed')
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="./styles/review.css" />
    <link rel="stylesheet" href="./styles/markdown.css" />
  </head>
  <body>
    <!-- ============================================================================
     EMBEDDED CONTENT (LLM injection point)
     ----------------------------------------------------------------------------
     To launch this HTML with markdown pre-loaded, the LLM (or you) just edits
     the <script id="embedded-md"> block below. Leave it empty to use the file
     picker as normal.

     - Set the data-name attribute to give the document a name.
     - Paste raw markdown between the script tags. No escaping needed EXCEPT
       any literal "</script>" inside the markdown must be written as
       "<\/script>".
     - Optionally pre-populate comments via <script id="embedded-feedback">
       (paste the same JSON shape that Export comments produces).
     ============================================================================ -->
    <script id="embedded-md" type="text/markdown" data-name="document.md"></script>
    <script id="embedded-feedback" type="application/json"></script>
    <!-- review-request CLI が --shiki-langs に応じて Shiki grammar の JSON を書き込む。
         空のままだと全コードブロックが plain text fallback として描画される。 -->
    <script id="embedded-shiki-langs" type="application/json"></script>

    <header class="app-header">
      <div class="app-brand">
        <a
          class="app-brand-title"
          href="https://github.com/oubakiou/mdxg-redline"
          target="_blank"
          rel="noopener noreferrer"
          >MDXG Redline</a
        >
      </div>
      <div class="toolbar-actions">
        <span id="status" class="label toolbar-status">No file</span>
        <button class="btn" id="btn-load">Open file</button>
        <button
          class="btn btn-ghost tooltipped"
          id="btn-theme"
          aria-label="Theme: system"
          data-tooltip="Switch to light"
        >
          ◐
        </button>
      </div>
    </header>

    <input type="file" id="file-md" accept=".md,.markdown,text/markdown,text/plain" hidden />

    <main class="layout">
      <!-- 左サイドバー: 仮想ページ TOC (MDXG §7 Page Navigation)。
           state.pages が空の間は CSS 側の :root:not(.has-pages) ルールで列ごと隠れる。
           page-nav-list 配下の <ul> は page-navigation.ts が描画する。 -->
      <aside class="page-nav" id="page-nav" aria-label="Document pages">
        <div id="page-nav-list"></div>
      </aside>

      <section class="doc-pane">
        <div id="doc-wrap">
          <!-- 初期表示の素の空状態。手元の markdown を 1 ファイル単発で見るユースケース向け。
               エージェント連携時は review-request CLI で生成された HTML を開く前提なので、
               この空状態は実質「直接ブラウザで開いた利用者」だけが目にする -->
          <div class="empty-state" id="empty-state-default">
            <div class="empty-state-title">No file loaded</div>
            <div class="label empty-state-hint">Open a markdown file to start reviewing</div>
          </div>
        </div>
        <div id="doc"></div>
      </section>

      <aside class="sidebar">
        <!-- ドラッグで横幅変更。SIDEBAR_MIN_WIDTH (240px) 未満まで縮めると snap で
             closed 状態になる (sidebar-resize.ts)。aria-orientation / aria-valuenow は
             sidebar-resize.ts が同期する。 -->
        <div
          class="sidebar-resize-handle"
          id="sidebar-resize-handle"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize comments panel"
          aria-controls="cmt-list"
          tabindex="0"
        ></div>
        <div class="sidebar-header">
          <!-- GitHub の Merge pull request 風 split button。
               隣接した 2 ボタンの border を内側で潰し、caret 側の半透明 border-left で
               「分割されているが 1 つの UI」として読ませる (CSS .split-btn-caret 参照) -->
          <div class="split-btn">
            <button
              class="btn btn-primary split-btn-main tooltipped"
              id="btn-send"
              data-tooltip="Choose an output folder and write the current feedback there"
              disabled
            >
              Write feedback.json
            </button>
            <button
              class="btn btn-primary split-btn-caret"
              id="btn-send-menu"
              aria-haspopup="true"
              aria-expanded="false"
              aria-label="Output folder options"
            >
              <span aria-hidden="true">▾</span>
            </button>
            <div class="menu" id="menu-send" role="menu">
              <button class="menu-item" id="btn-change-output" role="menuitem">
                Change output folder…
              </button>
            </div>
          </div>
          <div class="menu-wrap">
            <button
              class="btn btn-ghost"
              id="btn-comments-menu"
              aria-haspopup="true"
              aria-expanded="false"
            >
              <span id="cmt-count">0</span> comments<span class="menu-caret" aria-hidden="true"
                >▾</span
              >
            </button>
            <div class="menu" id="menu-comments" role="menu">
              <button class="menu-item" id="btn-copy" role="menuitem" disabled>Copy as JSON</button>
              <button class="menu-item" id="btn-export" role="menuitem" disabled>
                Export as JSON
              </button>
              <div class="menu-divider"></div>
              <button class="menu-item menu-item-danger" id="btn-clear" role="menuitem" disabled>
                Discard all
              </button>
            </div>
          </div>
        </div>
        <div id="cmt-list">
          <div class="label sidebar-hint">Select text in the file to add a review comment.</div>
        </div>
      </aside>
    </main>

    <!-- closed 状態のときだけ画面右端の toolbar 直下に出現する開閉タブ。クリックで前回幅復元、
         左へドラッグで連続的に幅を広げられる。doc-pane の scrollbar / sidebar 幅に応じて
         右オフセットが動的に変わる仕組みは sidebar-resize.ts の resolveScrollbarOffset +
         resolveViewportRightGap を参照。 -->
    <button
      type="button"
      class="sidebar-toggle-tab"
      id="sidebar-toggle-tab"
      aria-label="Show comments panel"
      aria-expanded="false"
      aria-controls="cmt-list"
    >
      <span aria-hidden="true">‹</span>
    </button>

    <div id="floater"><span aria-hidden="true">＋</span> Comment</div>

    <div class="modal-backdrop" id="modal">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-input-label">
        <div class="label modal-label">Selected text</div>
        <div id="modal-quote" class="cmt-quote modal-quote"></div>
        <div class="label modal-label" id="modal-input-label">Add a review comment</div>
        <textarea
          id="modal-input"
          rows="4"
          placeholder="Leave a comment"
          aria-labelledby="modal-input-label"
        ></textarea>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-save">Comment</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script type="module" src="./app/review.ts"></script>
  </body>
</html>
