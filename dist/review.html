         壊れた値 (旧バージョン / 他アプリの混入 / 手動編集) で初期描画と後続ランタイムが

          (effective === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {}

  </head>
  <body>
    <!-- ============================================================================
     EMBEDDED CONTENT (LLM injection point)
     ----------------------------------------------------------------------------
     To launch this HTML with markdown pre-loaded, the LLM (or you) just edits
     the <script id="embedded-md"> block below. Leave it empty to use the file
     picker as normal.

     - Set the data-name attribute to give the document a name.
     - Paste raw markdown between the script tags. No escaping needed EXCEPT
       any literal "</script>" inside the markdown must be written as
       "<\/script>".
     - Optionally pre-populate comments via <script id="embedded-feedback">
       (paste the same JSON shape that Export comments produces).
     ============================================================================ -->
    <script id="embedded-md" type="text/markdown" data-name="document.md"></script>
    <script id="embedded-feedback" type="application/json"></script>

    <header class="app-header">
      <div class="app-brand">
        <a
          class="app-brand-title"
          href="https://github.com/oubakiou/mdxg-redline"
          target="_blank"
          rel="noopener noreferrer"
          >MDXG Redline</a
        >
      </div>
      <div class="toolbar-actions">
        <span id="status" class="label toolbar-status">No file</span>
        <button class="btn" id="btn-load">Open file</button>
        <button
          class="btn btn-ghost tooltipped"
          id="btn-theme"
          aria-label="Theme: system"
          data-tooltip="Switch to light"
        >
          ◐
        </button>
      </div>
    </header>

    <input type="file" id="file-md" accept=".md,.markdown,text/markdown,text/plain" hidden />

    <main class="layout">
      <section class="doc-pane">
        <div id="doc-wrap">
          <!-- 初期表示の素の空状態。手元の markdown を 1 ファイル単発で見るユースケース向け。
               エージェント連携時は review-request CLI で生成された HTML を開く前提なので、
               この空状態は実質「直接ブラウザで開いた利用者」だけが目にする -->
          <div class="empty-state" id="empty-state-default">
            <div class="empty-state-title">No file loaded</div>
            <div class="label empty-state-hint">Open a markdown file to start reviewing</div>
            <button class="btn btn-primary" onclick="document.getElementById('btn-load').click()">
              Choose file
            </button>
          </div>
        </div>
        <div id="doc"></div>
      </section>

      <aside class="sidebar">
        <div class="sidebar-header">
          <!-- GitHub の Merge pull request 風 split button。
               隣接した 2 ボタンの border を内側で潰し、caret 側の半透明 border-left で
               「分割されているが 1 つの UI」として読ませる (CSS .split-btn-caret 参照) -->
          <div class="split-btn">
            <button
              class="btn btn-primary split-btn-main tooltipped"
              id="btn-send"
              data-tooltip="Choose an output folder and write the current feedback there"
            >
              Write feedback.json
            </button>
            <button
              class="btn btn-primary split-btn-caret"
              id="btn-send-menu"
              aria-haspopup="true"
              aria-expanded="false"
              aria-label="Output folder options"
            >
              <span aria-hidden="true">▾</span>
            </button>
            <div class="menu" id="menu-send" role="menu">
              <button class="menu-item" id="btn-change-output" role="menuitem">
                Change output folder…
              </button>
            </div>
          </div>
          <div class="menu-wrap">
            <button
              class="btn btn-ghost"
              id="btn-comments-menu"
              aria-haspopup="true"
              aria-expanded="false"
            >
              <span id="cmt-count">0</span> comments<span class="menu-caret" aria-hidden="true"
                >▾</span
              >
            </button>
            <div class="menu" id="menu-comments" role="menu">
              <button class="menu-item" id="btn-copy" role="menuitem">Copy as JSON</button>
              <button class="menu-item" id="btn-export" role="menuitem">Export as JSON</button>
              <div class="menu-divider"></div>
              <button class="menu-item menu-item-danger" id="btn-clear" role="menuitem">
                Discard all
              </button>
            </div>
          </div>
        </div>
        <div id="cmt-list">
          <div class="label sidebar-hint">Select text in the file to add a review comment.</div>
        </div>
      </aside>
    </main>

    <div id="floater"><span aria-hidden="true">＋</span> Comment</div>

    <div class="modal-backdrop" id="modal">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-input-label">
        <div class="label modal-label">Selected text</div>
        <div id="modal-quote" class="cmt-quote modal-quote"></div>
        <div class="label modal-label" id="modal-input-label">Add a review comment</div>
        <textarea
          id="modal-input"
          rows="4"
          placeholder="Leave a comment"
          aria-labelledby="modal-input-label"
        ></textarea>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-save">Comment</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

  </body>
</html>
